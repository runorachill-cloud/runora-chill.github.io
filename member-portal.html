<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>準備中 | RunoraChill</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f6eed6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #b8a07c;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(140, 118, 98, 0.1);
            max-width: 400px;
            width: 85%;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #5c4a3c;
            margin-bottom: 12px;
        }

        .message {
            font-size: 14px;
            color: #6d5947;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .back-button {
            display: inline-block;
            text-decoration: none;
            background: #b8a07c;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="title">🚪 メンバーの部屋</div>
        <div class="message">
            ただいま準備中です。<br>
            公開をどうぞお楽しみに！✨
        </div>
        <a href="index.html" class="back-button">トップページへ戻る</a>
    </div>

</body>
</html>
