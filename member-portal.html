<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンバーの部屋 | RunoraChill</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f6eed6;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .page-wrapper {
            width: 100%;
            height: 100%;
            /* 扉の背景画像を指定：正しいファイル名に変更しました */
            background-image: url('無題1_20260705103321.png');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            border: 2px solid #b8a07c;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 85%;
            backdrop-filter: blur(5px);
        }

        .title { font-size: 20px; font-weight: bold; color: #5c4a3c; margin-bottom: 12px; }
        .message { font-size: 14px; color: #6d5947; line-height: 1.6; margin-bottom: 24px; }
        .back-button {
            display: inline-block;
            text-decoration: none;
            background: #b8a07c;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }
        .back-button:hover { background: #8c7662; }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="box">
            <div class="title">🚪 メンバーの部屋</div>
            <div class="message">
                この扉の向こうは、まだ秘密の場所です。<br>
                開かれるその時を、どうぞお楽しみに！✨
            </div>
            <a href="index.html" class="back-button">トップページへ戻る</a>
        </div>
    </div>
</body>
</html>
