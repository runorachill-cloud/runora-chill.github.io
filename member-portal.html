<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンバーの部屋 | RunoraChill</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        /* 🚪 背景画像の設定（読み込みを優先） */
        .bg-container {
            width: 100%;
            height: 100%;
            background-image: url('210E7027-DACA-4FB5-829C-EF1E36F520ED.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-color: #2c2c2c; /* 画像読み込みまでの背景色 */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 🕯️ 案内ボックス */
        .box {
            text-align: center;
            background: rgba(246, 238, 214, 0.9);
            border: 2px solid #b8a07c;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            max-width: 350px;
            width: 80%;
            z-index: 10;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #5c4a3c;
            margin-bottom: 15px;
        }

        .message {
            font-size: 15px;
            color: #6d5947;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .back-button {
            display: inline-block;
            text-decoration: none;
            background: #8c7662;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .back-button:hover {
            background: #b8a07c;
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(140, 118, 98, 0.4);
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="box">
            <div class="title">🚪 メンバーの部屋</div>
            <div class="message">
                この扉の向こうは、まだ秘密の場所です。<br>
                開かれるその時を、<br>どうぞお楽しみに！✨
            </div>
            <a href="index.html" class="back-button">ポータルへ戻る</a>
        </div>
    </div>

</body>
</html>
