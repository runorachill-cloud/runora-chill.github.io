<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>もふ神神社 - おみくじ自販機</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f6eed6;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow-x: hidden;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            line-height: 0;
        }

        .base-image {
            width: 100%;
            height: auto;
            display: block;
            min-height: 300px; /* 画像が読み込まれる前の潰れ防止 */
            background-color: #f6eed6;
        }

        /* 📟 自販機のデジタル液晶風表示 */
        .vending-display {
            position: absolute;
            top: 37.3%;
            left: 68.3%;
            width: 8.5%;
            height: 4.0%;
            background-color: #1a0805;
            color: #ff3b30;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.8vw;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            border-radius: 2px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.8);
            text-shadow: 0 0 4px #ff3b30;
            pointer-events: none;
            z-index: 10;
        }

        @media (min-width: 800px) {
            .vending-display { font-size: 14px; }
        }

        /* 🔴 ボタン共通の透明クリックエリア */
        .vending-btn {
            position: absolute;
            cursor: pointer;
            z-index: 20;
        }

        /* 上段のボタン5つ (大吉、吉、中吉、小吉、末吉) */
        .btn-daikichi { top: 44.5%; left: 28.5%; width: 4.8%; height: 2.8%; }
        .btn-kichi    { top: 44.5%; left: 35.7%; width: 4.8%; height: 2.8%; }
        .btn-chukichi { top: 44.5%; left: 43.0%; width: 4.8%; height: 2.8%; }
        .btn-shokichi { top: 44.5%; left: 50.2%; width: 4.8%; height: 2.8%; }
        .btn-suekichi { top: 44.5%; left: 57.5%; width: 4.8%; height: 2.8%; }

        /* 下段のボタン3つ (凶、大凶、平) */
        .btn-kyou     { top: 63.3%; left: 32.2%; width: 4.8%; height: 2.8%; }
        .btn-daikyou  { top: 63.3%; left: 41.9%; width: 4.8%; height: 2.8%; }
        .btn-taira    { top: 63.3%; left: 51.5%; width: 4.8%; height: 2.8%; }

        /* 📜 取り出し口から飛び出すおみくじカード */
        .omikuji-card {
            display: none;
            position: absolute;
            top: 86%; 
            left: 50%;
            transform: translate(-50%, -20px) scale(0.5);
            width: 45%;
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            border: 3px solid #eaddc3;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            text-align: center;
            line-height: 1.5;
            z-index: 50;
            opacity: 0;
        }

        .omikuji-card.disp-anime {
            display: block;
            animation: emergeCard 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2) forwards;
        }

        @keyframes emergeCard {
            0% { transform: translate(-50%, 20px) scale(0.6); opacity: 0; }
            100% { transform: translate(-50%, -40px) scale(1); opacity: 1; }
        }

        .card-lucky {
            font-size: 4.5vw;
            font-weight: bold;
            margin: 10px 0;
        }
        .card-desc {
            font-size: 1.8vw;
            color: #5c4a3c;
            margin-bottom: 15px;
            padding: 0 10px;
        }

        .back-btn {
            display: inline-block;
            padding: 6px 18px;
            background-color: #b8a07c;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.6vw;
            font-weight: bold;
            line-height: 1.2;
        }

        @media (min-width: 800px) {
            .card-lucky { font-size: 36px; }
            .card-desc { font-size: 14px; }
            .back-btn { font-size: 13px; }
        }
    </style>
</head>
<body>

    <div class="wrapper" id="main-wrapper">
        <!-- 📷 読み込みエラーが起きたら別ルートを自動で試す特殊な画像タグです 🛡️ -->
        <img src="C1F896B4-C794-46E9-9A5B-98FAFB7E6516.png" 
             id="vending-img"
             alt="おみくじ自販機" 
             class="base-image"
             onerror="tryAlternativePaths(this)">

        <!-- 📟 デジタル液晶画面 -->
        <div class="vending-display" id="disp-text">200円</div>

        <!-- 🔴 透明なボタン判定エリア -->
        <div class="vending-btn btn-daikichi" data-btn="大吉"></div>
        <div class="vending-btn btn-kichi"    data-btn="吉"></div>
        <div class="vending-btn btn-chukichi" data-btn="中吉"></div>
        <div class="vending-btn btn-shokichi" data-btn="小吉"></div>
        <div class="vending-btn btn-suekichi" data-btn="末吉"></div>
        
        <div class="vending-btn btn-kyou"     data-btn="凶"></div>
        <div class="vending-btn btn-daikyou"  data-btn="大凶"></div>
        <div class="vending-btn btn-taira"    data-btn="平"></div>

        <!-- 📜 おみくじカード -->
        <div class="omikuji-card" id="omikuji-card">
            <h3 style="margin: 0; color: #8c7662; font-size: 14px;">⛩️ もふ神神社 御御籤 ⛩️</h3>
            <hr style="border: 1px dashed #eaddc3; margin: 8px 0;">
            <div class="card-lucky" id="card-lucky">大吉</div>
            <div class="card-desc" id="card-desc">結果テキスト</div>
            <a href="index.html" class="back-btn">ポータルに戻る</a>
        </div>
    </div>

    <script>
        // 🛡️ 画像がエラーになった場合の自動リトライ処理
        let pathTryCount = 0;
        function tryAlternativePaths(imgElement) {
            pathTryCount++;
            const originalName = "C1F896B4-C794-46E9-9A5B-98FAFB7E6516.png";
            
            if (pathTryCount === 1) {
                // パターン1: アプリ内部の相対パスを考慮してドットを付ける
                imgElement.src = "./" + originalName;
            } else if (pathTryCount === 2) {
                // パターン2: 途中で名前が削れている可能性を考慮した名前
                imgElement.src = "C794-46E9-9A5B-98FAFB7E6516.png";
            } else if (pathTryCount === 3) {
                // パターン3: 大文字小文字のズレを完全に無視する対策 (.PNG)
                imgElement.src = "C1F896B4-C794-46E9-9A5B-98FAFB7E6516.PNG";
            }
        }

        const dispText = document.getElementById('disp-text');
        const card = document.getElementById('omikuji-card');
        const cardLucky = document.getElementById('card-lucky');
        const cardDesc = document.getElementById('card-desc');
        const buttons = document.querySelectorAll('.vending-btn');

        const omikujiResults = [
            { lucky: '✨大吉✨', desc: '創作運・交流運ともに最高潮！もふ神様があなたの背中を優しく押してくれています🐾', color: '#e74c3c' },
            { lucky: '🌸吉🌸', desc: 'とても平穏で素敵な一日。何気ないチャットの中に素敵な創作のヒントが隠れているかも。', color: '#e67e22' },
            { lucky: '🍃中吉🍃', desc: '美味しいお茶を飲んでまったり過ごすと吉。コミュニティに幸せが満ちています。', color: '#f39c12' },
            { lucky: '🐾小吉🐾', desc: '小さな幸運がトコトコ歩いてやってくる予感。お気に入りの部屋に遊びに行ってみよう！', color: '#3498db' },
            { lucky: '☀️末吉☀️', desc: 'これからどんどん運気が上がっていくワクワクな状態。マイペースに進むのが一番です。', color: '#16a085' },
            { lucky: '🔮凶🔮', desc: 'ちょっぴりお疲れ気味かも？今日はいっぱいもふもふして、のんびりエネルギーを蓄えましょう。', color: '#9b59b6' },
            { lucky: '🌧️大凶🌧️', desc: '逆にここからは運気が上がるしかない大チャンス！もふ神神社へのお賽銭があなたを守ります。', color: '#7f8c8d' },
            { lucky: '🌾平（たいら）🌾', desc: '波風の立たない、とても穏やかでまっすぐな一日。創作の基盤をじっくり作るのに最適です。', color: '#2c3e50' }
        ];

        let isDrawing = false;

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isDrawing) return;
                isDrawing = true;

                card.classList.remove('disp-anime');

                try {
                    const pressAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-200.wav');
                    pressAudio.volume = 0.4;
                    pressAudio.play().catch(() => {});
                } catch(e){}

                let count = 0;
                const interval = setInterval(() => {
                    dispText.textContent = count % 2 === 0 ? "⏳" : "抽選";
                    count++;
                }, 200);

                setTimeout(() => {
                    clearInterval(interval);
                    dispText.textContent = "○円";

                    try {
                        const dropAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/1011/1011-200.wav');
                        dropAudio.volume = 0.5;
                        dropAudio.play().catch(() => {});
                    } catch(e){}

                    const result = omikujiResults[Math.floor(Math.random() * omikujiResults.length)];

                    cardLucky.textContent = result.lucky;
                    cardLucky.style.color = result.color;
                    cardDesc.textContent = result.desc;

                    card.classList.add('disp-anime');

                    isDrawing = false;
                }, 1400);
            });
        });
    </script>

</body>
</html>
