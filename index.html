<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill 公式ポータル</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; background-color: #f6eed6; font-family: sans-serif; overflow-x: hidden; }
        .wrapper { position: relative; width: 100%; max-width: 800px; margin: 0 auto; line-height: 0; }
        .base-image { width: 100%; height: auto; display: block; }

        /* ポータルリンク（ボタン） */
        .portal-link { position: absolute; width: 14.0%; height: 18.0%; cursor: pointer; z-index: 10; display: block; }
        .link-my-room        { top: 44.5%; left: 7.5%; }
        .link-member-portal  { top: 44.5%; left: 25.5%; }
        .link-news           { top: 44.5%; left: 43.5%; }
        .link-works          { top: 44.5%; left: 61.5%; }
        .link-support        { top: 44.5%; left: 79.5%; }

        /* ギミック配置 */
        .analog-clock { position: absolute; top: 23.45%; left: 70.8%; width: 16.5%; aspect-ratio: 1 / 1; transform: translate(-50%, -50%); pointer-events: none; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 4px; transform: translateX(-50%); }
        .hour-hand { width: 4%; height: 28%; background-color: #2b2b2b; z-index: 3; }
        .minute-hand { width: 2.5%; height: 40%; background-color: #333333; z-index: 2; }
        .second-hand { width: 1.5%; height: 44%; background-color: #cda831; z-index: 4; }
        .digital-container { position: absolute; top: 34.5%; left: 70.5%; transform: translate(-50%, -50%); width: 22%; text-align: center; color: #ffebad; font-family: monospace; font-weight: bold; pointer-events: none; }
        .digital-time { font-size: 2.1vw; }

        /* 掲示板と神社の表示エリア（背景のイラストに合わせる） */
        .village-board { position: absolute; top: 68.5%; left: 5.5%; width: 43%; height: 20.5%; font-size: 1.4vw; color: #5c4a3c; overflow-y: auto; z-index: 5; }
        .shrine-container { position: absolute; top: 68.5%; left: 51.5%; width: 43%; height: 20.5%; z-index: 5; }
        .saisen-trigger { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="無題1_20260705103321.png" alt="RunoraChill" class="base-image">

        <!-- リンク -->
        <a href="my-room.html" class="portal-link link-my-room"></a>
        <a href="member-portal.html" class="portal-link link-member-portal"></a>
        <div class="portal-link link-news" onclick="alert('📢 お知らせ：準備中')"></div>
        <div class="portal-link link-works" onclick="alert('🎨 最新作品：準備中')"></div>
        <div class="portal-link link-support" onclick="alert('💖 応援する：準備中')"></div>

        <!-- ギミック -->
        <div class="analog-clock"><div class="hand hour-hand" id="hour-hand"></div><div class="hand minute-hand" id="min-hand"></div><div class="hand second-hand" id="sec-hand"></div></div>
        <div class="digital-container"><div class="digital-time" id="digi-time">00:00:00</div></div>
        
        <!-- 掲示板と神社 -->
        <div class="village-board" id="board-content">
            📢 最新情報<br>
            ・メンバーが部屋の模様替えをしました<br>
            ・新しい小説が投稿されました<br>
            ・ポータルサイトがアップデートされました
        </div>
        <div class="shrine-container">
            <div class="saisen-trigger" onclick="alert('⛩️ お賽銭が入りました！')"></div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${(h % 12) * 30 + m * 0.5}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${m * 6 + s * 0.1}deg)`;
            document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            document.getElementById('digi-time').textContent = `${String(h % 12 || 12).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
