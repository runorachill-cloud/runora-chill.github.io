<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill - ゆるやかにつながる場所</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #e8ded1;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            line-height: 0;
        }

        .base-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 🕒 時計塔のデジタル時計の位置 */
        .clock-container {
            position: absolute;
            top: 32.3%;
            left: 51.5%;
            transform: translate(-50%, -50%);
            width: 25%;
            text-align: center;
            color: #ffebad;
            text-shadow: 0 0 8px rgba(243, 156, 18, 0.7);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            line-height: 1.2;
            pointer-events: none;
        }

        .digital-time {
            font-size: 4vw;
        }
        @media (min-width: 800px) {
            .digital-time { font-size: 32px; }
        }

        /* 🔗 透明なタッチリンク（押しやすいように広めに設定） */
        .invisible-link {
            position: absolute;
            display: block;
            text-decoration: none;
            border-radius: 12px;
            cursor: pointer;
            z-index: 10;
        }

        /* 「管理者（私）の部屋」ボタン（左上のピンクのドアのカード付近） */
        .link-my-room {
            top: 45%;
            left: 4%;
            width: 18%;
            height: 20%;
        }

        /* フッターのSNSアイコン群 */
        .footer-sns {
            position: absolute;
            bottom: 2.3%;
            width: 6%;
            height: 2.5%;
            border-radius: 50%;
            z-index: 10;
        }
        .sns-x { left: 40.5%; }
        .sns-ameblo { left: 46.5%; }
        .sns-youtube { left: 52.5%; }
        .sns-narou { left: 58.5%; }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- 💡 画像の名前のズレを自動解決する仕組みに強化しました -->
        <img src="image_2.png" onerror="this.src='image.png'; this.onerror=function(){this.src='image_2.PNG'; this.onerror=function(){this.src='image.PNG';}};" alt="RunoraChill Village" class="base-image">

        <!-- 🕒 リアルタイムデジタル時計 -->
        <div class="clock-container">
            <div class="digital-time" id="realtime-clock">00:00:00</div>
        </div>

        <!-- 🔗 各種リンク -->
        <a href="my-room.html" class="invisible-link link-my-room" title="管理者（私）の部屋へ"></a>
        <a href="https://x.com/mofugamiruna111?s=11" target="_blank" class="invisible-link footer-sns sns-x" title="X"></a>
        <a href="https://ameblo.jp/mofugamiruna0111/" target="_blank" class="invisible-link footer-sns sns-ameblo" title="アメブロ"></a>
        <a href="https://youtube.com/@mofugamiruna0111?si=fl_ygD-iyH6i2epW" target="_blank" class="invisible-link footer-sns sns-youtube" title="YouTube"></a>
        <a href="https://mypage.syosetu.com/3068539/" target="_blank" class="invisible-link footer-sns sns-narou" title="小説家になろう"></a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            const clockEl = document.getElementById('realtime-clock');
            if(clockEl) clockEl.textContent = `${hours}:${minutes}:${seconds}`;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
