<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill 公式ポータル</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; background-color: #f6eed6; font-family: sans-serif; overflow-x: hidden; }
        .wrapper { position: relative; width: 100%; max-width: 800px; margin: 0 auto; line-height: 0; }
        .base-image { width: 100%; height: auto; display: block; }

        /* 時計関連 */
        .analog-clock { position: absolute; top: 23.45%; left: 70.8%; width: 16.5%; aspect-ratio: 1 / 1; transform: translate(-50%, -50%); pointer-events: none; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 4px; transform: translateX(-50%); }
        .hour-hand { width: 4%; height: 28%; background-color: #2b2b2b; z-index: 3; }
        .minute-hand { width: 2.5%; height: 40%; background-color: #333333; z-index: 2; }
        .second-hand { width: 1.5%; height: 44%; background-color: #cda831; z-index: 4; }
        .digital-container { position: absolute; top: 34.5%; left: 70.5%; transform: translate(-50%, -50%); width: 22%; text-align: center; color: #ffebad; text-shadow: 0 0 6px rgba(243, 156, 18, 0.9); font-family: monospace; font-weight: bold; pointer-events: none; }

        /* 掲示板・神社 */
        .village-board { position: absolute; top: 68.5%; left: 5.5%; width: 43%; height: 20.5%; display: flex; flex-direction: column; }
        .shrine-container { position: absolute; top: 68.5%; left: 51.5%; width: 43%; height: 20.5%; display: flex; flex-direction: column; padding: 2% 3.5%; box-sizing: border-box; }
        .board-title, .shrine-title { font-weight: bold; color: #5c4a3c; text-align: center; font-size: 3vw; }
        .board-column { flex: 1; overflow-y: auto; font-size: 1.3vw; color: #5c4a3c; padding: 5px; }
        .saisen-trigger { position: absolute; bottom: 5%; left: 35%; width: 30%; height: 25%; cursor: pointer; z-index: 20; }

        /* ギミック用アニメーション */
        @keyframes floatUpAway {
            0% { transform: translate(-50%, 0) scale(0.7); opacity: 0; }
            15% { transform: translate(-50%, -20px) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -80px) scale(1); opacity: 0; }
        }
        .floating-counter, .floating-meow, .floating-saisen { position: absolute; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 100; animation: floatUpAway 1.2s ease-out forwards; color: #dca842; }

        /* ヘッダーメッセージ（改善版） */
        .header-message-zone {
            position: absolute; top: 2.2%; left: 55%; width: 35%; height: 6%;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none; z-index: 20; color: #5c4a3c;
            font-size: 3.5vw; font-weight: 800; text-align: center;
            opacity: 0; transition: opacity 1s ease-in-out;
            white-space: normal; word-break: break-all; line-height: 1.2;
        }
        @media (min-width: 800px) { .header-message-zone { font-size: 28px; } }

        /* リンク */
        .invisible-link { position: absolute; cursor: pointer; z-index: 10; }
        .link-my-room { top: 44.5%; left: 5.6%; width: 17%; height: 23%; }
        .link-member-portal { top: 44.5%; left: 23.5%; width: 17%; height: 23%; }
        .link-news-board { top: 44.5%; left: 41.5%; width: 17%; height: 23%; }
        .link-new-works { top: 44.5%; left: 59.5%; width: 17%; height: 23%; }
        .link-support-us { top: 44.5%; left: 77.4%; width: 17%; height: 23%; }
        .secret-bell-trigger { position: absolute; top: 22.1%; left: 86.1%; width: 7%; height: 7.6%; cursor: pointer; z-index: 15; }
        .secret-cat-trigger { position: absolute; top: 38.0%; left: 86.0%; width: 6.5%; height: 6.5%; cursor: pointer; z-index: 15; }
    </style>
</head>
<body>
    <div class="wrapper" id="main-wrapper">
        <img src="無題1_20260705103321.png" class="base-image">
        <div class="header-message-zone" id="header-message"></div>
        <div class="analog-clock">
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand minute-hand" id="min-hand"></div>
            <div class="hand second-hand" id="sec-hand"></div>
        </div>
        <div class="digital-container"><div id="digi-time"></div></div>
        <div class="village-board"><div class="board-title">📢 最新情報</div><div class="board-column" id="left-board"></div></div>
        <div class="shrine-container"><div class="shrine-title">⛩️ もふ神神社</div><div class="saisen-trigger" id="saisen-trigger"></div></div>
        <a href="my-room.html" class="invisible-link link-my-room"></a>
        <a href="member-portal.html" class="invisible-link link-member-portal"></a>
        <div class="invisible-link link-news-board"></div>
        <div class="invisible-link link-new-works"></div>
        <div class="invisible-link link-support-us"></div>
        <div class="secret-bell-trigger" id="bell-trigger"></div>
        <div class="secret-cat-trigger" id="cat-trigger"></div>
    </div>

    <script>
        const wrapper = document.getElementById('main-wrapper');
        // ヘッダーメッセージ
        const headerMsgs = ["ようこそ、RunoraChillへ！ゆっくりしていってくださいね。", "今日は何をして過ごしますか？素敵な一日になりますように。", "あなたのペースで、ゆるりと。クリエイティブな時間をどうぞ。"];
        const msgEl = document.getElementById('header-message');
        let msgIndex = 0;
        function rotateHeaderMsg() { msgEl.style.opacity = '0'; setTimeout(() => { msgEl.textContent = headerMsgs[msgIndex]; msgEl.style.opacity = '1'; msgIndex = (msgIndex + 1) % headerMsgs.length; }, 1000); }
        rotateHeaderMsg(); setInterval(rotateHeaderMsg, 6000);

        // ギミック：ベル
        document.getElementById('bell-trigger').addEventListener('click', (e) => {
            let count = parseInt(localStorage.getItem('bell') || '0') + 1;
            localStorage.setItem('bell', count);
            const f = document.createElement('div'); f.className = 'floating-counter'; f.innerText = `🔔 ${count}回目`;
            f.style.left = e.pageX + 'px'; f.style.top = e.pageY + 'px';
            wrapper.appendChild(f); setTimeout(() => f.remove(), 1200);
        });

        // ギミック：猫
        document.getElementById('cat-trigger').addEventListener('click', (e) => {
            const f = document.createElement('div'); f.className = 'floating-meow'; f.innerText = '🐾 にゃ〜ん';
            f.style.left = e.pageX + 'px'; f.style.top = e.pageY + 'px';
            wrapper.appendChild(f); setTimeout(() => f.remove(), 1200);
        });

        // ギミック：お賽銭
        document.getElementById('saisen-trigger').addEventListener('click', (e) => {
            let count = parseInt(localStorage.getItem('saisen') || '0') + 1;
            localStorage.setItem('saisen', count);
            const f = document.createElement('div'); f.className = 'floating-saisen'; f.innerText = `🪙 ${count}回目`;
            f.style.left = e.pageX + 'px'; f.style.top = e.pageY + 'px';
            wrapper.appendChild(f); setTimeout(() => f.remove(), 1200);
        });

        function updateClock() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${(h % 12) * 30 + m * 0.5}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${m * 6 + s * 0.1}deg)`;
            document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            document.getElementById('digi-time').textContent = `${String(h%12||12).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
        }
        setInterval(updateClock, 1000); updateClock();
    </script>
</body>
</html>
