<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill 公式ポータル</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f6eed6;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow-x: hidden;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            line-height: 0;
        }

        .base-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 🕒 アナログ時計 */
        .analog-clock {
            position: absolute;
            top: 23.45%;
            left: 70.8%;
            width: 16.5%;
            aspect-ratio: 1 / 1;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
            transform: translateX(-50%);
        }

        .hour-hand { width: 4%; height: 28%; background-color: #2b2b2b; z-index: 3; }
        .minute-hand { width: 2.5%; height: 40%; background-color: #333333; z-index: 2; }
        .second-hand { width: 1.5%; height: 44%; background-color: #cda831; z-index: 4; }

        /* 📱 デジタル時計と日付 */
        .digital-container {
            position: absolute;
            top: 34.5%;
            left: 70.5%;
            transform: translate(-50%, -50%);
            width: 22%;
            text-align: center;
            color: #ffebad;
            text-shadow: 0 0 6px rgba(243, 156, 18, 0.9);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            line-height: 1.2;
            pointer-events: none;
        }

        .digital-time { font-size: 2.1vw; }
        .digital-date { font-size: 1.1vw; margin-top: 2%; color: #e1cea1; }
        
        @media (min-width: 800px) {
            .digital-time { font-size: 17px; }
            .digital-date { font-size: 9px; }
        }

        /* 📜 最新情報掲示板 */
        .village-board {
            position: absolute;
            top: 68.5%;
            left: 5.5%;
            width: 43%;
            height: 20.5%;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            box-sizing: border-box;
        }

        .board-title {
            font-size: 3.5vw;
            font-weight: bold;
            color: #8c7662;
            text-align: center;
            margin-bottom: 4px;
            line-height: 1.2;
            letter-spacing: 1px;
        }

        .board-column {
            flex: 1;
            background: transparent;
            padding: 2px 10px 4px 10px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch; 
            box-sizing: border-box;
            font-size: 1.4vw;
            color: #5c4a3c;
            text-align: left;
            line-height: 1.4;
        }

        .board-column::-webkit-scrollbar { width: 6px; }
        .board-column::-webkit-scrollbar-thumb { background: #eaddc3; border-radius: 4px; }

        .log-item {
            margin-bottom: 5px;
            border-bottom: 1px dashed #eaddc3;
            padding-bottom: 3px;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .log-text { word-break: break-all; }
        .log-time { color: #b8a07c; font-size: 1.1vw; white-space: nowrap; }

        /* ⛩️ もふ神神社エリア */
        .shrine-container {
            position: absolute;
            top: 68.5%;
            left: 51.5%;
            width: 43%;
            height: 20.5%;
            display: flex;
            flex-direction: column;
            pointer-events: auto;
            box-sizing: border-box;
            padding: 2% 3.5% 3.5% 3.5%;
        }

        .shrine-title {
            font-size: 2.8vw;
            font-weight: bold;
            color: #5c4a3c;
            text-align: center;
            margin-bottom: 2%;
            line-height: 1.2;
        }

        .shrine-image-wrap {
            position: relative;
            width: 100%;
            flex-grow: 1;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(184, 160, 124, 0.15);
            border: 2px solid #fff;
            background-color: #fff;
        }

        .shrine-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 🪙 賽銭箱のクリックエリア */
        .saisen-trigger {
            position: absolute;
            bottom: 5%;
            left: 35%;
            width: 30%;
            height: 25%;
            cursor: pointer;
            z-index: 20;
        }
