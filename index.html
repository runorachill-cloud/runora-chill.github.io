<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill 公式ポータル</title>
    <style>
        /* 基本リセット */
        html, body { margin: 0; padding: 0; width: 100%; background-color: #f6eed6; font-family: sans-serif; overflow-x: hidden; }
        
        /* ラッパー（基準点） */
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .base-image { width: 100%; height: auto; display: block; }

        /* 配置要素共通設定 */
        .absolute-pos { position: absolute; pointer-events: auto; }

        /* ヘッダーメッセージ（吹き出し用） */
        .header-message-zone {
            position: absolute;
            top: 2%; /* 吹き出しの位置に合わせる */
            left: 55.5%;
            width: 37%;
            height: 7%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            color: #5c4a3c;
            font-size: 2.2vw;
            font-weight: bold;
            text-align: center;
            line-height: 1.2;
            z-index: 10;
        }

        /* 掲示板エリア（崩れ防止のため高さを固定せずフレキシブルに） */
        .village-board {
            position: absolute;
            top: 68.5%;
            left: 5.5%;
            width: 43%;
            height: 20%;
            display: flex;
            flex-direction: column;
        }

        /* 神社エリア */
        .shrine-container {
            position: absolute;
            top: 68.5%;
            left: 51.5%;
            width: 43%;
            height: 20%;
            padding: 2%;
            box-sizing: border-box;
        }

        /* その他微調整用 */
        @media (min-width: 800px) {
            .header-message-zone { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="wrapper" id="main-wrapper">
        <img src="無題1_20260705103321.png" alt="背景" class="base-image">

        <div class="header-message-zone" id="header-message">ただいまメンバー募集中です！</div>

        </div>

    <script>
        // メッセージ切り替えロジック
        const msgs = ["ただいまメンバー募集中です！", "素敵な作品がたくさんありますよ。"];
        const msgEl = document.getElementById('header-message');
        let idx = 0;
        setInterval(() => {
            msgEl.style.opacity = '0';
            setTimeout(() => {
                idx = (idx + 1) % msgs.length;
                msgEl.textContent = msgs[idx];
                msgEl.style.opacity = '1';
            }, 500);
        }, 5000);
    </script>
</body>
</html>
