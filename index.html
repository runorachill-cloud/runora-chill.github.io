<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill - ゆるやかにつながる場所</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #fcfaf2;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            line-height: 0;
        }
        .base-image {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 🕒 リアルタイムデジタル時計の位置（画像内のデジタル時計部分に重なります） */
        .clock-container {
            position: absolute;
            top: 32.5%;
            left: 51.5%;
            transform: translate(-50%, -50%);
            width: 30%;
            text-align: center;
            color: #ffebad;
            text-shadow: 0 0 8px rgba(243, 156, 18, 0.8);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            line-height: 1.2;
            pointer-events: none;
        }
        .digital-time { font-size: 4.5vw; }
        @media (min-width: 800px) { .digital-time { font-size: 36px; } }

        /* 🔗 透明なクリック判定エリア */
        .invisible-link {
            position: absolute;
            display: block;
            text-decoration: none;
            cursor: pointer;
            z-index: 10;
        }
        /* 「管理者（私）の部屋」ボタン（ピンクのドアとボタンを含むエリア） */
        .link-my-room { top: 44%; left: 4%; width: 18%; height: 21%; border-radius: 16px; }
        /* 各種SNSリンク（フッターの丸いアイコン） */
        .footer-sns { bottom: 2.3%; width: 6%; height: 2.5%; border-radius: 50%; }
        .sns-x { left: 40.5%; }
        .sns-ameblo { left: 46.5%; }
        .sns-youtube { left: 52.5%; }
        .sns-narou { left: 58.5%; }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="4B41A8E5-ABB3-4F14-9EB5-2DE9025E0A63.png" onerror="this.src='903F62F9-36E7-4A0D-B666-7D9ADEEBC86D.png';" alt="RunoraChill Village" class="base-image">
        
        <div class="clock-container"><div class="digital-time" id="realtime-clock">00:00:00</div></div>
        
        <a href="my-room.html" class="invisible-link link-my-room" title="管理者（私）の部屋へ"></a>
        <a href="https://x.com/mofugamiruna111?s=11" target="_blank" class="invisible-link footer-sns sns-x"></a>
        <a href="https://ameblo.jp/mofugamiruna0111/" target="_blank" class="invisible-link footer-sns sns-ameblo"></a>
        <a href="https://youtube.com/@mofugamiruna0111?si=fl_ygD-iyH6i2epW" target="_blank" class="invisible-link footer-sns sns-youtube"></a>
        <a href="https://mypage.syosetu.com/3068539/" target="_blank" class="invisible-link footer-sns sns-narou"></a>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('realtime-clock').textContent = `${h}:${m}:${s}`;
        }
        updateClock(); setInterval(updateClock, 1000);
    </script>
</body>
</html>
