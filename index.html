<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill - ゆるやかにつながる場所</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #e8ded1;
            font-family: sans-serif;
        }
        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background-color: #fcfaf2;
            min-height: 100vh;
        }
        .base-image {
            width: 100%;
            height: auto;
            display: block;
        }
        .clock-container {
            position: absolute;
            top: 32.3%;
            left: 51.5%;
            transform: translate(-50%, -50%);
            width: 25%;
            text-align: center;
            color: #ffebad;
            text-shadow: 0 0 8px rgba(243, 156, 18, 0.7);
            font-family: monospace;
            font-weight: bold;
            font-size: 5vw;
        }
        .invisible-link {
            position: absolute;
            display: block;
            z-index: 10;
        }
        .link-my-room { top: 45%; left: 4%; width: 18%; height: 20%; }
        .footer-sns { position: absolute; bottom: 2.3%; width: 6%; height: 2.5%; }
        .sns-x { left: 40.5%; }
        .sns-ameblo { left: 46.5%; }
        .sns-youtube { left: 52.5%; }
        .sns-narou { left: 58.5%; }
    </style>
</head>
<body>
    <div class="wrapper">
        <img src="image.png" onerror="this.src='image.PNG'; this.onerror=function(){this.src='image_2.png'; this.onerror=function(){this.style.display='none';}}" alt="RunoraChill Village" class="base-image">
        
        <div class="clock-container" id="realtime-clock">00:00:00</div>
        
        <a href="my-room.html" class="invisible-link link-my-room"></a>
        <a href="https://x.com/mofugamiruna111?s=11" target="_blank" class="invisible-link footer-sns sns-x"></a>
        <a href="https://ameblo.jp/mofugamiruna0111/" target="_blank" class="invisible-link footer-sns sns-ameblo"></a>
        <a href="https://youtube.com/@mofugamiruna0111?si=fl_ygD-iyH6i2epW" target="_blank" class="invisible-link footer-sns sns-youtube"></a>
        <a href="https://mypage.syosetu.com/3068539/" target="_blank" class="invisible-link footer-sns sns-narou"></a>
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('realtime-clock').textContent = `${h}:${m}:${s}`;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
