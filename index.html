<header class="hero">

    <div class="hero-background"></div>

    <img src="images/emblem.png"
         class="logo"
         alt="RunoraChill">

    <h1>RunoraChill</h1>

    <p class="subtitle">
        創る人と、応援する人が<br>
        ゆるやかにつながる場所
    </p>

    <section id="clock">

        <div class="clock-tower">

            <div class="roof"></div>

            <div id="analogClock"></div>

            <div class="door"></div>

        </div>

    </section>

</header>
/* ===== Hero ===== */

.hero{

    position:relative;

    overflow:hidden;

    text-align:center;

    padding:80px 20px;

}

.hero-background{

    position:absolute;

    inset:0;

    background:

    linear-gradient(
        #dff7ff,
        #fdfcf6
    );

    z-index:-3;

}
