<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill 公式ポータル</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f6eed6;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            overflow-x: hidden;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            line-height: 0;
        }

        .base-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 📢 メッセージティッカー */
        .top-message-ticker {
            position: absolute;
            top: 1.5%;
            left: 55%;
            width: 35%;
            height: 6%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
            z-index: 10;
        }

        .ticker-text {
            font-size: 2.5vw;
            font-weight: bold;
            color: #8c7662;
            text-shadow: 0 0 2px rgba(255, 255, 255, 0.8);
            white-space: nowrap;
            opacity: 0;
            animation: tickerFade 6s infinite;
            text-align: center;
            width: 100%;
        }

        @keyframes tickerFade {
            0%, 5% { opacity: 0; }
            20%, 80% { opacity: 1; }
            95%, 100% { opacity: 0; }
        }

        /* 🕒 時計関係 */
        .analog-clock { position: absolute; top: 23.45%; left: 70.8%; width: 16.5%; aspect-ratio: 1 / 1; transform: translate(-50%, -50%); pointer-events: none; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 4px; transform: translateX(-50%); }
        .hour-hand { width: 4%; height: 28%; background-color: #2b2b2b; z-index: 3; }
        .minute-hand { width: 2.5%; height: 40%; background-color: #333333; z-index: 2; }
        .second-hand { width: 1.5%; height: 44%; background-color: #cda831; z-index: 4; }
        .digital-container { position: absolute; top: 34.5%; left: 70.5%; transform: translate(-50%, -50%); width: 22%; text-align: center; color: #ffebad; text-shadow: 0 0 6px rgba(243, 156, 18, 0.9); font-family: 'Courier New', Courier, monospace; font-weight: bold; line-height: 1.2; pointer-events: none; }
        .digital-time { font-size: 2.1vw; }
        .digital-date { font-size: 1.1vw; margin-top: 2%; color: #e1cea1; }

        /* 📜 掲示板・神社 */
        .village-board { position: absolute; top: 68.5%; left: 5.5%; width: 43%; height: 20.5%; display: flex; flex-direction: column; pointer-events: auto; box-sizing: border-box; }
        .board-title { font-size: 3.5vw; font-weight: bold; color: #8c7662; text-align: center; margin-bottom: 4px; line-height: 1.2; letter-spacing: 1px; }
        .board-column { flex: 1; padding: 2px 10px 4px 10px; overflow-y: auto; font-size: 1.4vw; color: #5c4a3c; }
        .log-item { margin-bottom: 5px; border-bottom: 1px dashed #eaddc3; display: flex; justify-content: space-between; }
        .shrine-container { position: absolute; top: 68.5%; left: 51.5%; width: 43%; height: 20.5%; display: flex; flex-direction: column; pointer-events: auto; padding: 2% 3.5% 3.5% 3.5%; box-sizing: border-box; }
        .shrine-title { font-size: 2.8vw; font-weight: bold; color: #5c4a3c; text-align: center; margin-bottom: 2%; }
        .shrine-image-wrap { position: relative; width: 100%; flex-grow: 1; border-radius: 12px; overflow: hidden; border: 2px solid #fff; background-color: #fff; }
        .shrine-img { width: 100%; height: 100%; object-fit: cover; }
        .saisen-trigger { position: absolute; bottom: 5%; left: 35%; width: 30%; height: 25%; cursor: pointer; z-index: 20; }

        /* リンク・ギミック */
        .invisible-link { position: absolute; display: block; cursor: pointer; z-index: 10; }
        .link-my-room { top: 44.5%; left: 5.6%; width: 17.0%; height: 23.0%; }
        .link-member-portal { top: 44.5%; left: 23.5%; width: 17.0%; height: 23.0%; }
        .link-news-board { top: 44.5%; left: 41.5%; width: 17.0%; height: 23.0%; }
        .link-new-works { top: 44.5%; left: 59.5%; width: 17.0%; height: 23.0%; }
        .link-support-us { top: 44.5%; left: 77.4%; width: 17.0%; height: 23.0%; }
        .link-member-room { position: absolute; top: 38.0%; left: 65.3%; width: 10.5%; height: 7.5%; z-index: 12; border-radius: 50% / 100%; }
        .secret-bell-trigger { position: absolute; top: 22.1%; left: 86.1%; width: 7.0%; height: 7.6%; cursor: pointer; z-index: 15; }
        .secret-cat-trigger { position: absolute; top: 38.0%; left: 86.0%; width: 6.5%; height: 6.5%; cursor: pointer; z-index: 15; }

        @media (min-width: 800px) {
            .ticker-text { font-size: 20px; }
            .board-title { font-size: 28px; }
            .board-column { font-size: 11px; }
            .shrine-title { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="無題1_20260705103321.png" alt="RunoraChill ポータル" class="base-image">

        <div class="top-message-ticker">
            <div class="ticker-text" id="ticker-msg">RunoraChillへようこそ</div>
        </div>

        <div class="analog-clock">
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand minute-hand" id="min-hand"></div>
            <div class="hand second-hand" id="sec-hand"></div>
        </div>

        <div class="digital-container">
            <div class="digital-time" id="digi-time">00:00:00 PM</div>
            <div class="digital-date" id="digi-date">2026.07.07 Tue</div>
        </div>

        <div class="village-board">
            <div class="board-title">📢 最新情報</div>
            <div class="board-column">
                <div class="log-item"><span>🔔 もふ神留奈さんが模様替え</span><span>12:00</span></div>
                <div class="log-item"><span>🎨 ギャラリー追加</span><span>11:30</span></div>
                <div class="log-item"><span>💤 作業開始</span><span>10:15</span></div>
                <div class="log-item"><span>📖 小説投稿</span><span>09:45</span></div>
            </div>
        </div>

        <div class="shrine-container">
            <div class="shrine-title">⛩️ もふ神神社</div>
            <div class="shrine-image-wrap">
                <img src="AE6FE017-D49A-43A9-B908-5FB0955E87E8.png" alt="もふ神神社" class="shrine-img">
                <div class="saisen-trigger" id="saisen-trigger"></div>
            </div>
        </div>

        <a href="my-room.html" class="invisible-link link-my-room"></a>
        <a href="member-portal.html" class="invisible-link link-member-portal"></a>
        <div class="invisible-link link-news-board" onclick="alert('📢 お知らせは準備中です')"></div>
        <div class="invisible-link link-new-works" onclick="alert('📢 新着作品は準備中です')"></div>
        <div class="invisible-link link-support-us" onclick="alert('📢 応援する機能は準備中です')"></div>
        <a href="my-room.html" class="invisible-link link-member-room" id="member-door"></a>

        <div class="secret-bell-trigger" id="bell-trigger"></div>
        <div class="secret-cat-trigger" id="cat-trigger"></div>
    </div>

    <script>
        // メッセージ
        const messages = ["✨ ルノラチル", "📢 メンバー募集中", "🎨 創作活動を楽しみましょう", "☕ ゆっくりしていってください"];
        let currentIndex = 0;
        const tickerEl = document.getElementById('ticker-msg');
        function rotateTicker() {
            tickerEl.style.animation = 'none';
            tickerEl.offsetHeight; 
            tickerEl.style.animation = 'tickerFade 6s infinite';
            tickerEl.innerText = messages[currentIndex];
            currentIndex = (currentIndex + 1) % messages.length;
        }
        setInterval(rotateTicker, 6000);

        // 時計
        function updateClock() {
            const now = new Date();
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${(h % 12) * 30 + m * 0.5}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${m * 6 + s * 0.1}deg)`;
            document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${s * 6}deg)`;
            document.getElementById('digi-time').textContent = `${String(h % 12 || 12).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ギミック
        document.getElementById('bell-trigger').addEventListener('click', () => { 
            try { new Audio('https://assets.mixkit.co/active_storage/sfx/911/911-200.wav').play(); } catch(e) {} 
        });
        document.getElementById('cat-trigger').addEventListener('click', () => { 
            try { new Audio('https://assets.mixkit.co/active_storage/sfx/1110/1110-200.wav').play(); } catch(e) {} 
        });
        document.getElementById('saisen-trigger').addEventListener('click', () => { window.location.href = 'omikuji.html'; });
    </script>
</body>
</html>
