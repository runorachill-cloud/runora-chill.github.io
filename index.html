<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill 公式ポータル</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: #f6eed6;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            line-height: 0;
        }

        .base-image {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 🕒 アナログ時計（確定位置） */
        .analog-clock {
            position: absolute;
            top: 23.45%;
            left: 70.8%;
            width: 16.5%;
            aspect-ratio: 1 / 1;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom center;
            border-radius: 4px;
            transform: translateX(-50%);
        }

        .hour-hand { width: 4%; height: 28%; background-color: #2b2b2b; z-index: 3; }
        .minute-hand { width: 2.5%; height: 40%; background-color: #333333; z-index: 2; }
        .second-hand { width: 1.5%; height: 44%; background-color: #cda831; z-index: 4; }

        /* 📱 デジタル時計と日付（確定位置） */
        .digital-container {
            position: absolute;
            top: 34.5%;
            left: 70.5%;
            transform: translate(-50%, -50%);
            width: 22%;
            text-align: center;
            color: #ffebad;
            text-shadow: 0 0 6px rgba(243, 156, 18, 0.9);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            line-height: 1.2;
            pointer-events: none;
        }

        .digital-time { font-size: 2.1vw; }
        .digital-date { font-size: 1.1vw; margin-top: 2%; color: #e1cea1; }
        
        @media (min-width: 800px) {
            .digital-time { font-size: 17px; }
            .digital-date { font-size: 9px; }
        }

        /* 📜 大きな白い枠に重ねる「村の活動ログ掲示板」エリア */
        .village-board {
            position: absolute;
            top: 77.5%; /* イラストの下部、大きな白い枠の高さに配置 */
            left: 5%;
            width: 90%;
            height: 14%; /* 白い枠の縦幅に合わせて調整 */
            display: flex;
            gap: 4%;
            line-height: 1.4;
            pointer-events: auto;
        }

        /* 左側と右側の枠それぞれの中身設定 */
        .board-column {
            flex: 1;
            background: transparent; /* 背景の白枠を活かすため透明に */
            padding: 10px 15px;
            overflow-y: auto; /* 文字が増えたらスクロールできるように */
            box-sizing: border-box;
            font-size: 1.5vw;
            color: #5c4a3c;
            text-align: left;
        }

        .log-item {
            margin-bottom: 6px;
            border-bottom: 1px dashed #eaddc3;
            padding-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .log-time {
            color: #b8a07c;
            font-size: 1.2vw;
        }

        @media (min-width: 800px) {
            .board-column { font-size: 12px; }
            .log-time { font-size: 10px; }
        }

        /* 🔗 透明なリンクボタン */
        .invisible-link {
            position: absolute;
            display: block;
            text-decoration: none;
            cursor: pointer;
            z-index: 10;
        }

        /* 「管理者（私）の部屋」ボタン */
        .link-my-room { top: 62.9%; left: 6.2%; width: 17.6%; height: 2.8%; border-radius: 20px; }

        /* フッターのSNSアイコン群 */
        .footer-sns { bottom: 3.8%; width: 5.5%; height: 2.8%; border-radius: 50%; }
        .sns-x { left: 40.5%; }
        .sns-ameblo { left: 45.8%; }
        .sns-youtube { left: 51.2%; }
        .sns-narou { left: 56.5%; }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="無題1_20260705103321.png" alt="RunoraChill ポータル" class="base-image">

        <div class="analog-clock">
            <div class="hand hour-hand" id="hour-hand"></div>
            <div class="hand minute-hand" id="min-hand"></div>
            <div class="hand second-hand" id="sec-hand"></div>
        </div>

        <div class="digital-container">
            <div class="digital-time" id="digi-time">00:00:00 PM</div>
            <div class="digital-date" id="digi-date">2026.01.01 Sun</div>
        </div>

        <div class="village-board">
            <div class="board-column" id="left-board">
                <div class="log-item"><span>🔔 もふ神留奈さんが部屋の模様替えをしました</span><span class="log-time">12:00</span></div>
                <div class="log-item"><span>🎨 〇〇さんがギャラリーに画像を追加しました</span><span class="log-time">11:30</span></div>
                <div class="log-item"><span>💤 〇〇さんが部屋で作業を始めたようです</span><span class="log-time">10:15</span></div>
            </div>
            <div class="board-column" id="right-board">
                <div class="log-item"><span>📢 サーバーの定期メンテナンス完了のお知らせ</span><span class="log-time">昨日</span></div>
                <div class="log-item"><span>✨ RunoraChill 公式ポータルサイトがオープン！</span><span class="log-time">07/05</span></div>
            </div>
        </div>

        <a href="my-room.html" class="invisible-link link-my-room" title="管理者（私）の部屋へ"></a>
        <a href="https://x.com/mofugamiruna111?s=11" target="_blank" class="invisible-link footer-sns sns-x"></a>
        <a href="https://ameblo.jp/mofugamiruna0111/" target="_blank" class="invisible-link footer-sns sns-ameblo"></a>
        <a href="https://youtube.com/@mofugamiruna0111?si=fl_ygD-iyH6i2epW" target="_blank" class="invisible-link footer-sns sns-youtube"></a>
        <a href="https://mypage.syosetu.com/3068539/" target="_blank" class="invisible-link footer-sns sns-narou"></a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            const hourDeg = (hours % 12) * 30 + minutes * 0.5;
            const minDeg = minutes * 6 + seconds * 0.1;
            const secDeg = seconds * 6;
            
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${minDeg}deg)`;
            document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${secDeg}deg)`;
            
            let displayHours = hours % 12;
            displayHours = displayHours ? displayHours : 12; 
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const hStr = String(displayHours).padStart(2, '0');
            const mStr = String(minutes).padStart(2, '0');
            const sStr = String(seconds).padStart(2, '0');
            
            document.getElementById('digi-time').textContent = `${hStr}:${mStr}:${sStr} ${ampm}`;
            
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const dayName = weekDays[now.getDay()];
            
            document.getElementById('digi-date').textContent = `${y}.${m}.${d} ${dayName}`;
        }
        
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
