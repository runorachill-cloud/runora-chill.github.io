<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunoraChill - 復活テスト画面</title>
    <style>
        body {
            background-color: #e8ded1;
            font-family: sans-serif;
            text-align: center;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { font-size: 20px; margin-bottom: 10px; }
        #clock {
            font-size: 32px;
            font-weight: bold;
            color: #8c763d;
            margin: 20px 0;
            font-family: monospace;
        }
        .btn {
            display: block;
            background: #3a2d28;
            color: white;
            padding: 14px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RunoraChill 復旧テスト</h1>
        <p>画面が表示されていれば、ロックは解除されています！</p>
        
        <!-- 🕒 リアルタイム時計 -->
        <div id="clock">00:00:00</div>
        
        <!-- 🔗 各部屋へのボタン -->
        <a href="my-room.html" class="btn">管理者（私）の部屋に入る</a>
        <a href="https://x.com/mofugamiruna111?s=11" target="_blank" class="btn">Xを見る</a>
        <a href="https://ameblo.jp/mofugamiruna0111/" target="_blank" class="btn">アメブロを見る</a>
        <a href="https://youtube.com/@mofugamiruna0111?si=fl_ygD-iyH6i2epW" target="_blank" class="btn">YouTubeを見る</a>
        <a href="https://mypage.syosetu.com/3068539/" target="_blank" class="btn">なろうを見る</a>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            let h = String(now.getHours()).padStart(2, '0');
            let m = String(now.getMinutes()).padStart(2, '0');
            let s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
